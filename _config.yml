# Site settings
# Site settings
title: COMP110 Final Project - Yangxuan Guo and Xinyi Zhang
email: guoyangx@unc.edu
description: >- 
  This is the COMP110 final project website, featuring data analysis 
  on student survey results using Python and Seaborn.

baseurl: "/comp110-project" 
url: "https://YangxuanGuo.github.io" 

github_username: YangxuanGuo

# Build settings
remote_theme: "jekyll/minima"

plugins:
  - jekyll-remote-theme

# Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/